name: Deploy PagaAê Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixando o código do repositório
        uses: actions/checkout@v4

      - name: 2. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Build e Push da Imagem Docker
        run: |
          docker build -t caiogsant/pagaae-backend:latest .
          docker push caiogsant/pagaae-backend:latest

      - name: 4. Deploy automático na AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            cd /home/ubuntu/pagaae
            sudo docker compose pull backend-pagaae
            sudo docker compose up -d --no-deps backend-pagaae